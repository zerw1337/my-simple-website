networks:
  app:


services:

  certbot:
   image: certbot/certbot
   volumes:
     - "./certbot/conf:/etc/letsencrypt"
     - "./certbot/www:/var/www/certbot"


  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf"
      - "/etc/ssl/mycert:/etc/ssl/mycert:ro"
    networks:
      - app



  backend:
    build:
      dockerfile: ./Dockerfile
      context: ./backend

    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

    env_file:
      - ./backend/.env


    networks:
      - app



  frontend:
    build:
      dockerfile: ./Dockerfile
      context: ./frontend

    depends_on:
      - backend

    restart: unless-stopped

    networks:
      - app


  pg:
    env_file:
      - .env
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      - app

  pgadmin:
    env_file:
      - .env
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_DEFAULT_SERVER_MODE: False
    ports:
      - "5050:80"

    depends_on:
      pg:
        condition: service_healthy

    networks:
      - app



  redis:
    image: redis:7.2
    restart: always

    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 30

    networks:
      - app

  minio:
    env_file:
      - .env
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      REGION: ${MINIO_REGION}
    volumes:
      - ./minio_data:/data
    command: server --console-address ":9001" /data
    healthcheck:
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always

    networks:
      - app


volumes:

  pgdata:

  redis-data:
    driver: local
